version: '3.8'

services:
  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    ports:
      - '4000:4000'
    environment:
      - PORT=4000
      - NODE_ENV=development
    volumes:
      - ./packages/api/src:/app/packages/api/src
    restart: unless-stopped

  web:
    build:
      context: .
      dockerfile: Dockerfile.web
    ports:
      - '3000:3000'
    environment:
      - VITE_API_URL=http://api:4000
    depends_on:
      - api
    restart: unless-stopped
